<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Union Européenne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #070510;
  --ink2: #0d0b1e;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-border: rgba(201,168,76,0.35);
  --cream: #f5f0e8;
  --text: #e8e0d0;
  --text-dim: #9a8f7a;
  --eu-blue: #003399;
  --eu-gold: #FFCC00;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--ink); overflow: hidden; }

#app {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  background: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  color: var(--text);
}

/* HEADER */
header {
  background: linear-gradient(180deg, #0a0820 0%, var(--ink) 100%);
  border-bottom: 1px solid var(--gold-border);
  padding: 10px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-title {
  display: flex; align-items: center; gap: 10px;
}
.eu-flag-mini {
  width: 32px; height: 21px;
  background: var(--eu-blue);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
header h1 {
  font-family: 'IM Fell English', serif;
  font-size: 18px;
  color: var(--gold);
  letter-spacing: 0.5px;
  line-height: 1.1;
}
header h1 span { display: block; font-size: 11px; color: var(--text-dim); font-style: italic; font-family: 'Cormorant Garamond', serif; font-weight: 400; }
.lang-toggle { display: flex; gap: 4px; }
.lang-btn {
  background: none; border: 1px solid var(--gold-border);
  color: var(--text-dim); padding: 4px 10px;
  border-radius: 20px; font-size: 13px; cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  transition: all 0.2s;
}
.lang-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }

/* TABS */
nav {
  display: flex; background: var(--ink2);
  border-bottom: 1px solid var(--gold-border);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 10px 4px; background: none; border: none;
  color: var(--text-dim); font-size: 11px; cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; letter-spacing: 0.5px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.tab-btn .tab-icon { font-size: 18px; }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* CONTENT */
.tab-content { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.tab-content.active { display: flex; }

/* ===== PAYS TAB ===== */
#tab-pays { overflow: hidden; display: none; flex-direction: column; }
#tab-pays.active { display: flex; }
.search-bar {
  padding: 10px 12px; background: var(--ink2);
  border-bottom: 1px solid var(--gold-border); flex-shrink: 0;
}
.search-bar input {
  width: 100%; background: rgba(201,168,76,0.07);
  border: 1px solid var(--gold-border); border-radius: 20px;
  color: var(--text); padding: 7px 14px;
  font-family: 'Cormorant Garamond', serif; font-size: 15px;
  outline: none;
}
.search-bar input::placeholder { color: var(--text-dim); }
.pays-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.pays-list::-webkit-scrollbar { width: 4px; }
.pays-list::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
.pays-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(201,168,76,0.08);
  transition: background 0.15s;
}
.pays-item:active { background: var(--gold-dim); }
.pays-flag { font-size: 28px; flex-shrink: 0; }
.pays-info { flex: 1; min-width: 0; }
.pays-nom { font-size: 16px; color: var(--text); font-weight: 600; }
.pays-capitale { font-size: 13px; color: var(--text-dim); font-style: italic; }
.pays-arrow { color: var(--gold-dim); font-size: 16px; }

/* DETAIL OVERLAY */
.detail-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--ink);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  padding-top: var(--safe-top);
}
.detail-overlay.open { transform: translateX(0); }
.detail-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--gold-border);
  background: var(--ink2); flex-shrink: 0;
}
.back-btn {
  background: none; border: none; color: var(--gold);
  font-size: 22px; cursor: pointer; padding: 4px;
}
.detail-header h2 {
  font-family: 'IM Fell English', serif;
  color: var(--gold); font-size: 20px; flex: 1;
}
.detail-header .flag-big { font-size: 32px; }
.detail-scroll { flex: 1; overflow-y: auto; padding: 0 0 40px; }
.detail-scroll::-webkit-scrollbar { width: 4px; }
.detail-scroll::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
.detail-hero {
  background: linear-gradient(135deg, var(--ink2) 0%, #0d0b30 100%);
  padding: 20px 16px;
  border-bottom: 1px solid var(--gold-border);
  text-align: center;
}
.detail-flag-large { font-size: 72px; display: block; margin-bottom: 8px; }
.detail-nom { font-family: 'IM Fell English', serif; font-size: 26px; color: var(--gold); }
.detail-nom-en { font-size: 15px; color: var(--text-dim); font-style: italic; margin-top: 2px; }
.detail-section { padding: 16px 16px 0; }
.detail-section h3 {
  font-family: 'IM Fell English', serif; color: var(--gold);
  font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--gold-border);
}
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-card {
  background: var(--gold-dim); border: 1px solid var(--gold-border);
  border-radius: 8px; padding: 10px;
}
.info-card .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }
.info-card .value { font-size: 15px; color: var(--text); font-weight: 600; margin-top: 2px; }
.detail-desc {
  font-size: 15px; color: var(--text-dim); line-height: 1.7;
  margin-top: 10px;
}
.detail-wikipedia-img {
  width: 100%; max-height: 200px; object-fit: cover;
  border-radius: 8px; margin-top: 10px;
  border: 1px solid var(--gold-border);
}

/* ===== CARTE TAB ===== */
#tab-carte { overflow: hidden; }
#map { flex: 1; width: 100%; }

/* ===== QUIZ TAB ===== */
#tab-quiz { overflow-y: auto; }
#tab-quiz::-webkit-scrollbar { width: 4px; }
#tab-quiz::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
.quiz-container { padding: 16px; max-width: 600px; margin: 0 auto; }
.quiz-header-section {
  text-align: center; padding: 20px 0 16px;
  border-bottom: 1px solid var(--gold-border); margin-bottom: 16px;
}
.quiz-header-section h2 { font-family: 'IM Fell English', serif; color: var(--gold); font-size: 22px; }
.quiz-header-section p { color: var(--text-dim); font-size: 14px; margin-top: 4px; font-style: italic; }
.quiz-score-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--gold-dim); border: 1px solid var(--gold-border);
  border-radius: 10px; padding: 10px 16px; margin-bottom: 16px;
}
.score-item { text-align: center; }
.score-item .num { font-family: 'IM Fell English', serif; font-size: 24px; color: var(--gold); }
.score-item .lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.quiz-type-selector {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.quiz-type-btn {
  flex: 1; padding: 8px 4px; background: none;
  border: 1px solid var(--gold-border); border-radius: 8px;
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  font-family: 'Cormorant Garamond', serif; transition: all 0.2s;
  text-align: center;
}
.quiz-type-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
.question-card {
  background: var(--ink2); border: 1px solid var(--gold-border);
  border-radius: 12px; padding: 20px; margin-bottom: 14px;
}
.question-number { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.question-flag { font-size: 56px; display: block; text-align: center; margin: 12px 0; }
.question-text { font-size: 18px; color: var(--text); text-align: center; font-style: italic; line-height: 1.4; }
.answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.answer-btn {
  background: rgba(201,168,76,0.06); border: 1px solid var(--gold-border);
  color: var(--text); padding: 12px 8px; border-radius: 8px;
  font-family: 'Cormorant Garamond', serif; font-size: 14px;
  cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.3;
}
.answer-btn:active { transform: scale(0.97); }
.answer-btn.correct { background: rgba(76,201,100,0.2); border-color: #4cc964; color: #4cc964; }
.answer-btn.wrong { background: rgba(201,76,76,0.2); border-color: #c94c4c; color: #c94c4c; }
.answer-btn.disabled { pointer-events: none; opacity: 0.5; }
.quiz-feedback {
  text-align: center; padding: 12px;
  font-size: 16px; font-weight: 600; border-radius: 8px;
  margin-top: 10px; display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct { background: rgba(76,201,100,0.1); color: #4cc964; }
.quiz-feedback.wrong { background: rgba(201,76,76,0.1); color: #c94c4c; }
.next-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, #a87a30 100%);
  border: none; border-radius: 10px; color: var(--ink);
  font-family: 'IM Fell English', serif; font-size: 17px;
  cursor: pointer; margin-top: 12px; display: none;
  transition: opacity 0.2s;
}
.next-btn.show { display: block; }
.quiz-result {
  text-align: center; padding: 30px 16px;
  display: none;
}
.quiz-result.show { display: block; }
.quiz-result .big-score { font-family: 'IM Fell English', serif; font-size: 64px; color: var(--gold); }
.quiz-result h3 { font-family: 'IM Fell English', serif; color: var(--gold); font-size: 24px; margin: 8px 0; }
.quiz-result p { color: var(--text-dim); font-size: 15px; font-style: italic; }
.restart-btn {
  margin-top: 20px; padding: 14px 40px;
  background: var(--gold-dim); border: 1px solid var(--gold);
  color: var(--gold); border-radius: 10px;
  font-family: 'IM Fell English', serif; font-size: 17px; cursor: pointer;
}

/* ===== INSTITUTIONS TAB ===== */
#tab-instit { overflow-y: auto; flex-direction: column; }
#tab-instit::-webkit-scrollbar { width: 4px; }
#tab-instit::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
.instit-list { padding: 0 0 40px; }
.instit-section-header {
  padding: 16px 14px 8px;
  font-family: 'IM Fell English', serif;
  color: var(--gold); font-size: 13px;
  letter-spacing: 1.5px; text-transform: uppercase;
  border-bottom: 1px solid var(--gold-border);
  background: linear-gradient(180deg, rgba(201,168,76,0.06) 0%, transparent 100%);
}
.instit-intro {
  padding: 14px 14px 2px;
  font-size: 13px; color: var(--text-dim); font-style: italic; line-height: 1.6;
}
.instit-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(201,168,76,0.08);
  transition: background 0.15s;
}
.instit-card:active { background: var(--gold-dim); }
.instit-card-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold-dim), rgba(201,168,76,0.05));
  border: 1px solid var(--gold-border); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.instit-card-body { flex: 1; min-width: 0; }
.instit-card-nom { font-size: 15px; color: var(--text); font-weight: 600; line-height: 1.2; }
.instit-card-tagline { font-size: 12px; color: var(--text-dim); font-style: italic; margin-top: 2px; line-height: 1.3; }
.instit-card-badge {
  font-size: 10px; color: var(--gold); background: var(--gold-dim);
  border: 1px solid var(--gold-border); border-radius: 10px;
  padding: 2px 8px; margin-top: 5px; display: inline-block; letter-spacing: 0.3px;
}
.instit-card-arrow { color: var(--gold-border); font-size: 16px; flex-shrink: 0; }
.instit-power-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 8px 0; border-bottom: 1px solid rgba(201,168,76,0.06);
}
.instit-power-bullet { color: var(--gold); font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.instit-power-text { font-size: 14px; color: var(--text-dim); line-height: 1.5; }

/* ===== MES APPS TAB ===== */
#tab-apps { overflow-y: auto; }
#tab-apps::-webkit-scrollbar { width: 4px; }
#tab-apps::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
.apps-container { padding: 16px; }
.apps-header {
  text-align: center; padding: 16px 0 20px;
  border-bottom: 1px solid var(--gold-border); margin-bottom: 16px;
}
.apps-header h2 { font-family: 'IM Fell English', serif; color: var(--gold); font-size: 22px; }
.apps-header p { color: var(--text-dim); font-size: 13px; margin-top: 4px; font-style: italic; }
.apps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.app-card {
  background: var(--ink2); border: 1px solid var(--gold-border);
  border-radius: 12px; padding: 14px 10px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  text-decoration: none; display: block;
}
.app-card:active { background: var(--gold-dim); transform: scale(0.97); }
.app-icon { font-size: 32px; display: block; margin-bottom: 6px; }
.app-name { font-size: 12px; color: var(--text); font-weight: 600; line-height: 1.2; }
.app-cat { font-size: 10px; color: var(--text-dim); margin-top: 3px; font-style: italic; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(7,5,16,0.85);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
  padding-bottom: var(--safe-bot);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box {
  background: #0f0d22; border: 1px solid var(--gold-border);
  border-radius: 16px 16px 0 0; padding: 20px;
  width: 100%; max-width: 480px;
  transform: translateY(100%); transition: transform 0.3s ease;
}
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-box h3 { font-family: 'IM Fell English', serif; color: var(--gold); font-size: 20px; margin-bottom: 12px; text-align: center; }
.modal-box p { color: var(--text); line-height: 1.6; margin-bottom: 12px; text-align: center; }
.modal-ok {
  width: 100%; padding: 12px;
  background: var(--gold-dim); border: 1px solid var(--gold);
  color: var(--gold); border-radius: 8px;
  font-family: 'IM Fell English', serif; font-size: 16px; cursor: pointer;
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="header-title">
      <div class="eu-flag-mini">🇪🇺</div>
      <h1>
        <span id="h-subtitle">Les 27 pays membres</span>
        Union Européenne
      </h1>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('fr')">🇫🇷</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧</button>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav>
    <button class="tab-btn active" onclick="showTab('pays')" id="btn-pays">
      <span class="tab-icon">🗺</span>
      <span data-fr="Pays" data-en="Countries">Pays</span>
    </button>
    <button class="tab-btn" onclick="showTab('carte')" id="btn-carte">
      <span class="tab-icon">📍</span>
      <span data-fr="Carte" data-en="Map">Carte</span>
    </button>
    <button class="tab-btn" onclick="showTab('quiz')" id="btn-quiz">
      <span class="tab-icon">🎯</span>
      <span data-fr="Quiz" data-en="Quiz">Quiz</span>
    </button>
    <button class="tab-btn" onclick="showTab('instit')" id="btn-instit">
      <span class="tab-icon">🏛</span>
      <span data-fr="Institutions" data-en="Institutions">Institutions</span>
    </button>
    <button class="tab-btn" onclick="showTab('apps')" id="btn-apps">
      <span class="tab-icon">📱</span>
      <span data-fr="Mes Apps" data-en="My Apps">Mes Apps</span>
    </button>
  </nav>

  <!-- ===== PAYS TAB ===== -->
  <div class="tab-content active" id="tab-pays">
    <div class="search-bar">
      <input type="search" id="search-input" data-placeholder-fr="Rechercher un pays..." data-placeholder-en="Search a country..." placeholder="Rechercher un pays..." oninput="filterPays(this.value)">
    </div>
    <div class="pays-list" id="pays-list"></div>
  </div>

  <!-- ===== CARTE TAB ===== -->
  <div class="tab-content" id="tab-carte">
    <div id="map"></div>
  </div>

  <!-- ===== QUIZ TAB ===== -->
  <div class="tab-content" id="tab-quiz">
    <div class="quiz-container">
      <div class="quiz-header-section">
        <h2>🎯 <span data-fr="Quiz Europe" data-en="Europe Quiz">Quiz Europe</span></h2>
        <p data-fr="Testez vos connaissances sur l'UE" data-en="Test your EU knowledge">Testez vos connaissances sur l'UE</p>
      </div>
      <div class="quiz-score-bar">
        <div class="score-item">
          <div class="num" id="q-score">0</div>
          <div class="lbl" data-fr="Score" data-en="Score">Score</div>
        </div>
        <div class="score-item">
          <div class="num" id="q-current">1</div>
          <div class="lbl" data-fr="Question" data-en="Question">Question</div>
        </div>
        <div class="score-item">
          <div class="num" id="q-total">10</div>
          <div class="lbl" data-fr="Total" data-en="Total">Total</div>
        </div>
      </div>
      <div class="quiz-type-selector">
        <button class="quiz-type-btn active" onclick="setQuizType('capitale')" id="qtype-capitale">
          🏛 <span data-fr="Capitale" data-en="Capital">Capitale</span>
        </button>
        <button class="quiz-type-btn" onclick="setQuizType('drapeau')" id="qtype-drapeau">
          🚩 <span data-fr="Drapeau" data-en="Flag">Drapeau</span>
        </button>
        <button class="quiz-type-btn" onclick="setQuizType('pays')" id="qtype-pays">
          🗺 <span data-fr="Pays" data-en="Country">Pays</span>
        </button>
      </div>
      <div id="quiz-area">
        <div class="question-card" id="question-card">
          <div class="question-number" id="q-num">QUESTION 1 / 10</div>
          <span class="question-flag" id="q-flag"></span>
          <p class="question-text" id="q-text"></p>
          <div class="answers-grid" id="answers-grid"></div>
          <div class="quiz-feedback" id="quiz-feedback"></div>
          <button class="next-btn" id="next-btn" onclick="nextQuestion()">
            <span data-fr="Question suivante →" data-en="Next question →">Question suivante →</span>
          </button>
        </div>
        <div class="quiz-result" id="quiz-result">
          <div class="big-score" id="result-score"></div>
          <h3 id="result-title"></h3>
          <p id="result-msg"></p>
          <button class="restart-btn" onclick="startQuiz()">
            <span data-fr="Rejouer" data-en="Play again">Rejouer</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== INSTITUTIONS TAB ===== -->
  <div class="tab-content" id="tab-instit">
    <div class="instit-list" id="instit-list"></div>
  </div>

  <!-- ===== MES APPS TAB ===== -->
  <div class="tab-content" id="tab-apps">
    <div class="apps-container">
      <div class="apps-header">
        <h2>📱 <span data-fr="Mes Applications" data-en="My Applications">Mes Applications</span></h2>
        <p data-fr="Découvrez toutes mes apps" data-en="Discover all my apps">Découvrez toutes mes apps</p>
      </div>
      <div class="apps-grid" id="apps-grid"></div>
    </div>
  </div>

</div><!-- #app -->

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <h2 id="detail-title"></h2>
    <span class="flag-big" id="detail-flag-header"></span>

function renderInstitutions() {
  const list = document.getElementById('instit-list');
  const groups = currentLang === 'fr' ? INSTIT_GROUPS.fr : INSTIT_GROUPS.en;
  const intro = currentLang === 'fr'
    ? "L'Union européenne repose sur un système institutionnel unique, qui partage les pouvoirs entre plusieurs organes aux rôles complémentaires."
    : "The European Union is built on a unique institutional system, sharing powers between several bodies with complementary roles.";

  let html = `<div class="instit-intro">${intro}</div>`;
  groups.forEach(g => {
    html += `<div class="instit-section-header">${g.label}</div>`;
    g.ids.forEach(id => {
      const inst = INSTITUTIONS.find(i => i.id === id);
      if (!inst) return;

        </div>

}

function renderPaysList(filter = '') {
  const list = document.getElementById('pays-list');
  const q = filter.toLowerCase();
  const pays = PAYS_UE.filter(p => {
    const nom = currentLang === 'fr' ? p.fr : p.en;
    const cap = currentLang === 'fr' ? p.capitale_fr : p.capitale_en;
    return nom.toLowerCase().includes(q) || cap.toLowerCase().includes(q);
  }).sort((a,b) => {
    const na = currentLang === 'fr' ? a.fr : a.en;
    const nb = currentLang === 'fr' ? b.fr : b.en;
    return na.localeCompare(nb);
  });
  list.innerHTML = pays.map(p => {
    const nom = currentLang === 'fr' ? p.fr : p.en;
    const cap = (currentLang === 'fr' ? p.capitale_fr : p.capitale_en);

function setQuizType(type) {

  document.querySelectorAll('.quiz-type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('qtype-' + type).classList.add('active');
  startQuiz();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  quizScore = 0;
  quizCurrent = 0;
  quizAnswered = false;
  const shuffled = shuffle(PAYS_UE).slice(0, QUIZ_TOTAL);
  quizQuestions = shuffled.map(p => {
    const wrong = shuffle(PAYS_UE.filter(x => x.code !== p.code)).slice(0, 3);
    const all = shuffle([p, ...wrong]);
    return { pays: p, options: all };
  });
  document.getElementById('q-score').textContent = '0';
  document.getElementById('q-total').textContent = QUIZ_TOTAL;
  document.getElementById('quiz-result').classList.remove('show');
  document.getElementById('question-card').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  if (quizCurrent >= QUIZ_TOTAL) { showResult(); return; }
  const q = quizQuestions[quizCurrent];
  const p = q.pays;
  quizAnswered = false;

  document.getElementById('q-num').textContent = `${currentLang==='fr'?'QUESTION':'QUESTION'} ${quizCurrent+1} / ${QUIZ_TOTAL}`;
  document.getElementById('q-current').textContent = quizCurrent + 1;

  let qFlag = '', qText = '';
  if (quizType === 'capitale') {
    qFlag = p.flag;
    const capLabel = currentLang === 'fr' ? 'Quelle est la capitale de' : "What is the capital of";
    const nom = currentLang === 'fr' ? p.fr : p.en;
    qText = `${capLabel} ${nom} ?`;
  } else if (quizType === 'drapeau') {
    qFlag = p.flag;
    qText = currentLang === 'fr' ? 'À quel pays appartient ce drapeau ?' : 'Which country does this flag belong to?';
  } else {
    qFlag = '';
    const cap = currentLang === 'fr' ? p.capitale_fr : p.capitale_en;
    qText = currentLang === 'fr'
      ? `${cap} est la capitale de quel pays ?`
      : `${cap} is the capital of which country?`;
  }

  document.getElementById('q-flag').textContent = qFlag;
  document.getElementById('q-text').textContent = qText;

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = q.options.map(opt => {
    let label = '';
    if (quizType === 'capitale') {
      label = currentLang === 'fr' ? opt.capitale_fr : opt.capitale_en;
    } else if (quizType === 'drapeau') {
      label = currentLang === 'fr' ? opt.fr : opt.en;
    } else {
      label = currentLang === 'fr' ? opt.fr : opt.en;
    }
    return `<button class="answer-btn" onclick="checkAnswer('${opt.code}')">${label}</button>`;
  }).join('');

  document.getElementById('quiz-feedback').classList.remove('show','correct','wrong');
  document.getElementById('next-btn').classList.remove('show');
}

function checkAnswer(code) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizCurrent];
  const correct = q.pays.code === code;
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(btn => {
    btn.classList.add('disabled');
    const label = btn.textContent.trim();
    let correctLabel = '';
    if (quizType === 'capitale') correctLabel = currentLang==='fr' ? q.pays.capitale_fr : q.pays.capitale_en;
    else correctLabel = currentLang==='fr' ? q.pays.fr : q.pays.en;
    if (label === correctLabel) btn.classList.add('correct');
  });
  if (!correct) {
    // find and mark clicked wrong
    event.target.classList.add('wrong');
    event.target.classList.remove('disabled');
  }
  if (correct) quizScore++;
  document.getElementById('q-score').textContent = quizScore;
  const fb = document.getElementById('quiz-feedback');
  if (correct) {
    fb.textContent = currentLang==='fr' ? '✓ Bonne réponse !' : '✓ Correct!';
    fb.className = 'quiz-feedback show correct';
  } else {
    const corr = quizType === 'capitale'
      ? (currentLang==='fr' ? q.pays.capitale_fr : q.pays.capitale_en)
      : (currentLang==='fr' ? q.pays.fr : q.pays.en);
    fb.textContent = (currentLang==='fr' ? '✗ Réponse : ' : '✗ Answer: ') + corr;
    fb.className = 'quiz-feedback show wrong';
  }
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  quizCurrent++;
  if (quizCurrent >= QUIZ_TOTAL) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('question-card').style.display = 'none';
  const res = document.getElementById('quiz-result');
  res.classList.add('show');
  document.getElementById('result-score').textContent = `${quizScore}/${QUIZ_TOTAL}`;
  const pct = quizScore / QUIZ_TOTAL;
  let title, msg;
  if (currentLang === 'fr') {
    if (pct >= 0.9) { title = 'Excellent !'; msg = 'Vous connaissez parfaitement l\'Union Européenne !'; }
    else if (pct >= 0.7) { title = 'Très bien !'; msg = 'Bravo, vous maîtrisez la géographie européenne.'; }
    else if (pct >= 0.5) { title = 'Pas mal !'; msg = 'Quelques révisions s\'imposent…'; }
    else { title = 'À revoir…'; msg = 'L\'Europe n\'a pas de secrets pour personne — continuez !'; }
  } else {
    if (pct >= 0.9) { title = 'Excellent!'; msg = 'You know the European Union perfectly!'; }
    else if (pct >= 0.7) { title = 'Very good!'; msg = 'Well done, you master European geography.'; }
    else if (pct >= 0.5) { title = 'Not bad!'; msg = 'A little more studying needed…'; }
    else { title = 'Keep learning!'; msg = 'Europe has no secrets — keep going!'; }
  }
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;
}

// =========================================================
// MES APPS
// =========================================================
function renderApps() {
  const grid = document.getElementById('apps-grid');
  grid.innerHTML = MES_APPS.map(a => {
    const nom = currentLang === 'fr' ? a.nom_fr : a.nom_en;
    const cat = currentLang === 'fr' ? a.cat_fr : a.cat_en;
    const url = a.id ? `https://apps.apple.com/app/${a.id}` : '#';
    return `<a class="app-card" href="${url}" onclick="openApp(event,'${url}')">
      <span class="app-icon">${a.icon}</span>
      <div class="app-name">${nom}</div>
      <div class="app-cat">${cat}</div>
    </a>`;
  }).join('');
}

function openApp(e, url) {
  e.preventDefault();
  if (url === '#') return;
  if (window.Capacitor) window.open(url, '_system');
  else window.open(url, '_blank');
}

// =========================================================
// MODAL
// =========================================================
function showModal(title, msg) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e.target.id === 'modal-overlay') document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// =========================================================
// INIT
// =========================================================
window.addEventListener('DOMContentLoaded', () => {
  renderPaysList();
  renderApps();
  renderInstitutions();
  startQuiz();
});
</script>
</body>
</html>
